name: simaksi
description: SIMAKSI - Sistem Informasi BPS Kabupaten Sukabumi
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Permission & Info
  permission_handler: ^11.4.0
  flutter_downloader: ^1.12.0
  device_info_plus: ^12.0.0
  package_info_plus: ^8.2.0

  # Navigation
  go_router: ^14.8.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.0

  # HTTP & API
  dio: ^5.8.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0

  # Local Storage
  shared_preferences: ^2.5.0
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0

  # UI Components
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.2.0
  flutter_svg: ^2.0.17
  lottie: ^3.2.0
  animations: ^2.0.12

  # Utilities
  intl: ^0.20.1
  url_launcher: ^6.3.2
  connectivity_plus: ^6.1.2
  flutter_pdfview: ^1.3.2
  html_unescape: ^2.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Playfair
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
